spring:
  application:
    name: spring-boot-restful-webservices-postgresql

  datasource:
    url: jdbc:postgresql://localhost:5432/user_management
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    #PostgreSQLDialect does not need to be specified explicitly as it will be selected by default
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

#Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true
  endpoint:
    health:
      show-details: ALWAYS

info:
  app:
    name: Spring Boot Restful Web Services
    description: Spring Boot Restful Web Services Demo
    version: 1.0.0