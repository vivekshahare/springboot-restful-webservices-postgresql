spring:
  application:
    name: spring-boot-restful-webservices-postgresq

  datasource:
    url: jdbc:postgresql://localhost:5432/user_management
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    #PostgreSQLDialect does not need to be specified explicitly as it will be selected by default
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect